name: log_pilot_mcp
description: >-
  MCP (Model Context Protocol) server for log_pilot. Exposes runtime log
  state to AI coding agents in Cursor, Claude Code, Windsurf, and
  other MCP-compatible tools.
version: 1.1.0
homepage: https://github.com/MojtabaTavakkoli/log_pilot
repository: https://github.com/MojtabaTavakkoli/log_pilot_mcp
issue_tracker: https://github.com/MojtabaTavakkoli/log_pilot_mcp/issues
topics:
  - mcp
  - logging
  - debug
  - ai-agents

screenshots:
  - description: 'LogPilot MCP Server - exposing Flutter app state to AI agents'
    path: screenshots/banner.png

environment:
  sdk: ^3.9.2

dependencies:
  dart_mcp: ^0.5.0
  vm_service: ^15.0.0

dev_dependencies:
  lints: ^5.1.1
  test: ^1.25.8

executables:
  log_pilot_mcp: log_pilot_mcp
